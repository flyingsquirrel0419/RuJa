# Full test262 conformance run split into parallel jobs by directory.
# Each runner processes one immediate child directory of test262/test,
# but language/ is expanded to its own subdirectories so the top-level
# language directory is not also re-run in full.

name: test262-full

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build RuJa (release)
        run: cargo build --release
      - name: Upload RuJa binary
        uses: actions/upload-artifact@v4
        with:
          name: ruja-release
          path: target/release/ruja

  setup:
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.dirs.outputs.dirs }}
    steps:
      - name: Checkout full test262
        run: git clone --depth 1 https://github.com/tc39/test262.git ~/test262
      - name: Build directory matrix
        id: dirs
        run: |
          # Enumerate test262/test children. language/ is expanded into its
          # subdirectories; do not also include language/ itself.
          dirs=$(cd ~/test262/test && {
            find . -maxdepth 1 -mindepth 1 -type d | sed 's|^\./||' | grep -vx 'harness\|language'
            find ./language -maxdepth 1 -mindepth 1 -type d 2>/dev/null | sed 's|^\./||'
          } | sort -u | jq -R . | jq -s -c .)
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"
          echo "matrix directories: $dirs"

  test262-full:
    needs: [build, setup]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.setup.outputs.dirs) }}
    steps:
      - uses: actions/checkout@v4
      - name: Download RuJa binary
        uses: actions/download-artifact@v4
        with:
          name: ruja-release
          path: target/release/
      - name: Make RuJa executable
        run: chmod +x target/release/ruja
      - name: Checkout full test262
        run: git clone --depth 1 https://github.com/tc39/test262.git ~/test262
      - name: Run test262 /${{ matrix.dir }}
        run: |
          DIR="${{ matrix.dir }}"
          SAFE_DIR="${DIR//\//_}"
          TEST262=~/test262 python3 tools/test262_runner.py "$DIR" > "test262_${SAFE_DIR}_result.txt" 2>&1
          cat "test262_${SAFE_DIR}_result.txt"
      - name: Publish /${{ matrix.dir }} pass rate
        if: always()
        run: |
          DIR="${{ matrix.dir }}"
          SAFE_DIR="${DIR//\//_}"
          FILE="test262_${SAFE_DIR}_result.txt"
          rate=$(grep '^RATE=' "$FILE" | sed 's/RATE=//;s/ .*//')
          pass=$(grep '^RATE=' "$FILE" | sed 's/.*PASS=//;s/ .*//')
          fail=$(grep '^RATE=' "$FILE" | sed 's/.*FAIL=//;s/ .*//')
          total=$(grep '^RATE=' "$FILE" | sed 's/.*TOTAL=//;s/ .*//')
          {
            echo "## test262 /${{ matrix.dir }}"
            echo ""
            echo "**Pass rate: ${rate}%** - ${pass} passed, ${fail} failed, ${total} total"
            echo "(unsupported-feature tests are skipped)"
            echo ""
            echo "<details><summary>Full breakdown for /${{ matrix.dir }}</summary>"
            echo ""
            echo '```'
            cat "$FILE"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload /${{ matrix.dir }} result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test262-${{ strategy.job-index }}-result
          path: test262_*_result.txt

  summary:
    needs: test262-full
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all test262 results
        uses: actions/download-artifact@v4
        with:
          path: test262-results
          pattern: test262-*-result
      - name: Aggregate and publish
        run: |
          total_pass=0
          total_fail=0
          total_skip=0
          total_total=0
          for f in test262-results/test262-*-result/*_result.txt; do
            [ -f "$f" ] || continue
            pass=$(grep '^RATE=' "$f" | sed 's/.*PASS=//;s/ .*//')
            fail=$(grep '^RATE=' "$f" | sed 's/.*FAIL=//;s/ .*//')
            skip=$(grep '^RATE=' "$f" | sed 's/.*SKIP=//;s/ .*//')
            total=$(grep '^RATE=' "$f" | sed 's/.*TOTAL=//;s/ .*//')
            total_pass=$((total_pass + ${pass:-0}))
            total_fail=$((total_fail + ${fail:-0}))
            total_skip=$((total_skip + ${skip:-0}))
            total_total=$((total_total + ${total:-0}))
          done
          ran=$((total_pass + total_fail))
          if [ "$ran" -gt 0 ]; then
            rate=$(awk "BEGIN { printf \"%.1f\", $total_pass * 100 / $ran }")
          else
            rate=0.0
          fi
          {
            echo "## test262 conformance (full, aggregate)"
            echo ""
            echo "**Pass rate: ${rate}%** - ${total_pass} passed, ${total_fail} failed, ${total_skip} skipped, ${total_total} total"
            echo ""
            echo '```'
            echo "Total tests: ${total_total}"
            echo "Actually run:  ${ran}"
            echo "Passed:        ${total_pass}"
            echo "Failed:        ${total_fail}"
            echo "Skipped:       ${total_skip}"
            echo "Pass rate:     ${rate}%"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
