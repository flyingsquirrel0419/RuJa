# Disabled: RuJa is not yet ready for crates.io release. The trigger below
# matches no real branch, so this workflow will never run. To re-enable,
# replace the `on.push` block with:
#
#   on:
#     push:
#       tags:
#         - "v*"
#
# and ensure the CARGO_REGISTRY_TOKEN secret is set.
name: publish

on:
  push:
    # Disabled until the engine stabilizes.
    branches: ["__publish_disabled__"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify clean build
        run: |
          cargo build --release
          cargo test
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
