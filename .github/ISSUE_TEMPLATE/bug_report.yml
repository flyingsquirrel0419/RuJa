name: 🐛 Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so we can reproduce and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: The smallest JS snippet that reproduces the issue.
      value: |
        ```sh
        cargo run --release -- -e "..."
        ```
      render: sh
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened (output, panic, wrong result, etc.).
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: RuJa version
      placeholder: "0.2.0-alpha"
    validations:
      required: true
  - type: input
    id: rust
    attributes:
      label: Rust toolchain
      placeholder: "rustc 1.96.0"
    validations:
      required: false
